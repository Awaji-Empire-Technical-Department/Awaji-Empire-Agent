<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編集 - {{ survey['title'] }}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ css_ver }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/event.css') }}?v={{ css_ver }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">アンケート編集</div>
        <a href="{{ url_for('index') }}" class="btn btn-sm btn-outline" style="color:white; border-color:white;">
            <i class="fas fa-arrow-left"></i> ダッシュボードへ戻る
        </a>
    </nav>

    <div class="container" style="max-width: 800px;">
        <form action="{{ url_for('survey.save_survey') }}" method="post" id="surveyForm">
            <input type="hidden" name="survey_id" value="{{ survey['id'] }}">
            <input type="hidden" name="questions_json" id="questionsJson">

            <div class="card">
                <div class="form-group">
                    <label>アンケートタイトル</label>
                    <input type="text" name="title" value="{{ survey['title'] }}" class="form-control" style="font-size:1.2rem; font-weight:bold;" required placeholder="タイトルを入力">
                </div>
                <div class="form-group" style="margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border-color);">
                    <label class="event-checkbox-label">
                        <input type="checkbox" id="is-event-form">
                        <i class="fas fa-calendar-check" style="color:var(--accent-blue);"></i>
                        イベント参加フォームとして作成する
                    </label>
                    <p class="event-settings-hint">
                        ⚠️ 応募にはDiscordアカウントが必要です。部の設定・参加費・締切を管理できます。
                    </p>
                </div>
            </div>

            <!-- イベント設定セクション（チェック時に展開） -->
            <input type="hidden" id="eventSettingsJson" name="event_settings_json" value="">
            <div id="event-settings-section" style="display:none;">
                <div class="card">
                    <div class="card-header"><h3 class="card-title"><i class="fas fa-cog"></i> イベント設定</h3></div>
                    <div style="padding:1rem; display:flex; flex-direction:column; gap:1rem;">

                        <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                            <div class="form-group" style="flex:1; min-width:180px;">
                                <label>参加費（円）</label>
                                <input type="number" id="event-fee" min="0" class="form-control" placeholder="0 = 無料">
                            </div>
                            <div class="form-group" style="flex:1; min-width:200px;">
                                <label>応募締切</label>
                                <input type="datetime-local" id="event-deadline" class="form-control">
                            </div>
                        </div>

                        <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                            <div class="form-group" style="flex:1; min-width:200px;">
                                <label>開始日時 <span style="font-size:.8rem; color:var(--gray);">（部なしの場合）</span></label>
                                <input type="datetime-local" id="event-date" class="form-control">
                            </div>
                            <div class="form-group" style="flex:1; min-width:200px;">
                                <label>終了日時 <span style="font-size:.8rem; color:var(--gray);">（省略=開始+2時間）</span></label>
                                <input type="datetime-local" id="event-end-date" class="form-control">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>集合場所 <span style="font-size:.8rem; color:var(--gray);">（部なしの場合・住所または場所名）</span></label>
                            <input type="text" id="event-location" class="form-control" placeholder="例: ○○市民会館 大ホール / 東京都千代田区…">
                        </div>

                        <div class="form-group">
                            <label>全体備考</label>
                            <textarea id="event-notes" class="form-control" rows="2" placeholder="参加者全員への共通メモ"></textarea>
                        </div>

                        <div>
                            <label style="font-weight:bold;"><i class="fas fa-layer-group"></i> 部の設定</label>
                            <p style="font-size:.82rem; color:var(--gray); margin:.2rem 0 .6rem;">
                                部を追加しない場合は部制なし（全員共通の日時）になります。
                            </p>
                            <div id="event-session-list"></div>
                            <button type="button" id="btn-add-session" class="btn btn-outline btn-sm">
                                <i class="fas fa-plus"></i> 部を追加
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="questionsContainer"></div>

            <div style="text-align:center; margin-top:2rem; margin-bottom:4rem;">
                <button type="button" class="btn btn-primary" onclick="addQuestion()" style="margin-right:10px;">
                    <i class="fas fa-plus-circle"></i> 質問を追加
                </button>
                <button type="submit" class="btn btn-success btn-lg" style="min-width:200px;">
                    <i class="fas fa-save"></i> 保存して完了
                </button>
            </div>
        </form>
    </div>

    <script>window.initialQuestions = {{ questions | tojson }};</script>
    <script src="{{ url_for('static', filename='js/edit_survey.js') }}?v={{ css_ver }}"></script>
</body>
</html>
