name: CI/CD Deploy

on:
  push:
    branches: [master, test]

jobs:
  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/master'
    runs-on: [self-hosted, 01sv-ubuntu]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Rust bridge
        working-directory: ./database_bridge
        run: |
          source "$HOME/.cargo/env"
          if [ -f /Awaji-Empire-Agent/discord_bot/.env ]; then
            set -a && source /Awaji-Empire-Agent/discord_bot/.env && set +a
          fi
          cargo build --release

      - name: Sync to production directory
        run: |
          sudo rsync -av --exclude='.git' ./ /Awaji-Empire-Agent/

      - name: Install uv
        run: |
          if ! command -v /usr/local/bin/uv &> /dev/null; then
            curl -LsSf https://astral.sh/uv/install.sh | sudo env UV_INSTALL_DIR=/usr/local/bin sh
          fi

      - name: Install dependencies
        working-directory: /Awaji-Empire-Agent/discord_bot
        run: |
          sudo chown -R $(whoami):$(whoami) .venv || true
          /usr/local/bin/uv sync

      - name: Restart Services
        run: |
          # 改行コード修正と権限付与を自動化
          sudo sed -i 's/\r$//' /Awaji-Empire-Agent/scripts/setup-systemd.sh
          sudo chmod +x /Awaji-Empire-Agent/scripts/setup-systemd.sh
          
          echo "Executing setup script..."
          sudo /Awaji-Empire-Agent/scripts/setup-systemd.sh
          
          echo "Restarting additional services..."
          sudo systemctl restart discord_bot.service
          sudo systemctl restart discord_webapp.service

  deploy-test:
    name: Deploy to Test
    if: github.ref == 'refs/heads/test'
    runs-on: [self-hosted, 02sv-testenv]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Rust bridge
        working-directory: ./database_bridge
        run: |
          source "$HOME/.cargo/env"
          if [ -f /Awaji-Empire-Agent/discord_bot/.env ]; then
            set -a && source /Awaji-Empire-Agent/discord_bot/.env && set +a
          fi
          cargo build --release

      - name: Sync to production directory
        run: |
          sudo rsync -av --exclude='.git' ./ /Awaji-Empire-Agent/

      - name: Install uv
        run: |
          if ! command -v /usr/local/bin/uv &> /dev/null; then
            curl -LsSf https://astral.sh/uv/install.sh | sudo env UV_INSTALL_DIR=/usr/local/bin sh
          fi

      - name: Install dependencies
        working-directory: /Awaji-Empire-Agent/discord_bot
        run: |
          sudo chown -R $(whoami):$(whoami) .venv || true
          /usr/local/bin/uv sync

      - name: Restart Services
        run: |
          sudo sed -i 's/\r$//' /Awaji-Empire-Agent/scripts/setup-systemd.sh
          sudo chmod +x /Awaji-Empire-Agent/scripts/setup-systemd.sh
          
          sudo /Awaji-Empire-Agent/scripts/setup-systemd.sh
          sudo systemctl restart discord_bot.service
          sudo systemctl restart discord_webapp.service
