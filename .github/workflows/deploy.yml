name: CI/CD Deploy

on:
  push:
    branches: [master, test]

jobs:
  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/master'
    runs-on: [self-hosted, 01sv-ubuntu]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Rust bridge
        working-directory: ./database_bridge
        run: |
          source "$HOME/.cargo/env"
          if [ -f /Awaji-Empire-Agent/discord_bot/.env ]; then
            set -a && source /Awaji-Empire-Agent/discord_bot/.env && set +a
          fi
          cargo build --release

      - name: Sync to production directory
        run: |
          sudo rsync -av --exclude='.git' ./ /Awaji-Empire-Agent/

      - name: Install uv
        run: |
          if ! command -v /usr/local/bin/uv &> /dev/null; then
             # sudoers に /usr/bin/env が必要な理由
             curl -LsSf https://astral.sh/uv/install.sh | sudo env UV_INSTALL_DIR=/usr/local/bin sh
          fi

      - name: Install dependencies
        working-directory: /Awaji-Empire-Agent/discord_bot
        run: |
          # パスワードを求められても止まらないよう -n を付与して試行
          sudo -n chown -R $(whoami):$(whoami) .venv || echo "Warning: sudo chown failed, skipping..."
          /usr/local/bin/uv sync

      - name: Restart Services
        run: |
          echo "Current User: $(whoami)"
          echo "Checking script path..."
          ls -l /Awaji-Empire-Agent/scripts/setup-systemd.sh
          
          # -n (non-interactive) を付けて sudo 実行。失敗時にエラーログが出る。
          echo "Executing setup script..."
          sudo -n /Awaji-Empire-Agent/scripts/setup-systemd.sh || echo "Error: Setup script execution failed (maybe sudoers issue)"
          
          echo "Restarting additional services..."
          sudo -n systemctl restart discord_bot.service || echo "Error: Restarting discord_bot failed"
          sudo -n systemctl restart discord_webapp.service || echo "Error: Restarting discord_webapp failed"

  deploy-test:
    name: Deploy to Test
    if: github.ref == 'refs/heads/test'
    runs-on: [self-hosted, 02sv-testenv]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Rust bridge
        working-directory: ./database_bridge
        run: |
          source "$HOME/.cargo/env"
          if [ -f /Awaji-Empire-Agent/discord_bot/.env ]; then
            set -a && source /Awaji-Empire-Agent/discord_bot/.env && set +a
          fi
          cargo build --release

      - name: Sync to production directory
        run: |
          sudo rsync -av --exclude='.git' ./ /Awaji-Empire-Agent/

      - name: Install uv
        run: |
          if ! command -v /usr/local/bin/uv &> /dev/null; then
             curl -LsSf https://astral.sh/uv/install.sh | sudo env UV_INSTALL_DIR=/usr/local/bin sh
          fi

      - name: Install dependencies
        working-directory: /Awaji-Empire-Agent/discord_bot
        run: |
          sudo -n chown -R $(whoami):$(whoami) .venv || echo "Warning: sudo chown failed"
          /usr/local/bin/uv sync

      - name: Restart Services
        run: |
          sudo -n /Awaji-Empire-Agent/scripts/setup-systemd.sh || echo "Error: Setup script failed"
          sudo -n systemctl restart discord_bot.service
          sudo -n systemctl restart discord_webapp.service
