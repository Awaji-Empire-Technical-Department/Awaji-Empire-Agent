# /etc/nginx/sites-available/awaji-empire
# Awaji Empire Agent - リバースプロキシ設定
#
# シンボリックリンクで有効化:
#   sudo ln -sf /Awaji-Empire-Agent/infra/nginx-awaji.conf /etc/nginx/sites-enabled/awaji-empire
#   sudo nginx -t && sudo systemctl reload nginx

# WebSocket アップグレードヘッダーのマッピング
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;  # 必要に応じてドメイン名に変更

    # 静的ファイルは nginx が直接配信（キャッシュ12時間）
    location /static/ {
        alias /Awaji-Empire-Agent/discord_bot/static/;
        expires 12h;
        add_header Cache-Control "public, max-age=43200";
    }

    # WebSocket プロキシ（/ws/ プレフィックスのパス）
    # Quart が /ws/hyouibana を処理し、Rust Bridge へ中継する
    location /ws/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket ハンドシェイクに必要なヘッダー
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        # WS 接続は長時間維持されるためタイムアウトを延長
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # その他すべてのリクエストは Quart へ
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
